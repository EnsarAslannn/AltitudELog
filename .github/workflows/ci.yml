name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verify Docker is available (required by Testcontainers)
        run: docker info

      - name: Restore dependencies
        run: dotnet restore AltitudELog.slnx

      - name: Build
        run: dotnet build AltitudELog.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test AltitudELog.slnx --configuration Release --no-build --verbosity normal
